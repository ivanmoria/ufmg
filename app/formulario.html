<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>T-MIRIM | Anamnese & Histórico Sonoro-Musical</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ─────────────────────────────────────── */
:root {
  --bg:       #0b0d13; --surface: #12151f; --panel: #181c28;
  --border:   #272d40; --border2: #323a52;
  --accent:   #3ddba8; --accent-bg: rgba(61,219,168,.12);
  --accent2:  #ff5e7a; --accent3: #ffcc44; --accent4: #7b8cff;
  --text:     #dde1ef; --textdim: #6b748f; --textsub: #4a5168;
  --radius:   10px; --sans: 'Plus Jakarta Sans',sans-serif;
  --mono:     'DM Mono',monospace;
}
html.light {
  --bg:#eef0f7; --surface:#fff; --panel:#f4f5fb;
  --border:#d2d6e8; --border2:#bfc4d8;
  --accent:#0a8c6a; --accent-bg:rgba(10,140,106,.1);
  --accent2:#d4233c; --accent3:#b87a00; --accent4:#3d4fc8;
  --text:#18202e; --textdim:#50597a; --textsub:#8890a8;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: var(--sans); background: var(--bg); color: var(--text);
  min-height: 100vh; padding: 0 0 60px;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ─────────────────────────────────────────────── */
.form-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 18px 32px; display: flex; align-items: center;
  justify-content: space-between; gap: 16px; position: sticky; top:0; z-index:100;
}
.form-header h1 {
  font-family: 'Syne',sans-serif; font-size: 1.15rem; font-weight: 800;
  color: var(--accent); letter-spacing:-0.5px;
}
.form-header .subtitle { font-size:.75rem; color:var(--textdim); margin-top:2px; }
.theme-btn {
  background: var(--panel); border: 1px solid var(--border2);
  color: var(--textdim); border-radius:8px; padding:6px 12px;
  cursor:pointer; font-size:.85rem; transition:all .15s;
}
.theme-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── Progress bar ───────────────────────────────────────── */
.progress-bar { height:3px; background:var(--panel); position:sticky; top:61px; z-index:99; }
.progress-fill { height:100%; background:var(--accent); width:0%; transition:width .4s ease; }

/* ── Layout ─────────────────────────────────────────────── */
.form-body { max-width:780px; margin:0 auto; padding:28px 20px; }

/* ── Step / Section ─────────────────────────────────────── */
.section {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); margin-bottom:16px; overflow:hidden;
  transition:border-color .2s;
}
.section:focus-within { border-color:var(--border2); }
.section-header {
  padding:14px 20px; cursor:pointer; display:flex;
  align-items:center; gap:12px; user-select:none;
  background:var(--surface);
}
.section-header:hover { background:var(--panel); }
.section-icon { font-size:1.1rem; flex-shrink:0; }
.section-title {
  font-weight:700; font-size:.92rem; flex:1; color:var(--text);
}
.section-chevron {
  font-size:.75rem; color:var(--textdim); transition:transform .25s;
}
.section.open .section-chevron { transform:rotate(180deg); }
.section-body {
  display:none; padding:20px; border-top:1px solid var(--border);
  gap:16px; flex-direction:column;
}
.section.open .section-body { display:flex; }

/* ── Fields ─────────────────────────────────────────────── */
.field { display:flex; flex-direction:column; gap:5px; }
.field label {
  font-size:.78rem; font-weight:600; color:var(--textdim);
  text-transform:uppercase; letter-spacing:.8px;
}
.field input[type=text],
.field input[type=date],
.field input[type=number],
.field textarea,
.field select {
  background:var(--panel); border:1px solid var(--border);
  color:var(--text); border-radius:7px; padding:9px 12px;
  font-family:var(--sans); font-size:.9rem;
  transition:border-color .15s, box-shadow .15s;
  width:100%;
}
.field input:focus, .field textarea:focus, .field select:focus {
  outline:none; border-color:var(--accent);
  box-shadow: 0 0 0 3px var(--accent-bg);
}
.field textarea { resize:vertical; min-height:72px; }

.row-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
@media(max-width:560px){.row-2,.row-3{grid-template-columns:1fr;}}

/* ── Radio / Toggle group ───────────────────────────────── */
.radio-group {
  display:flex; flex-wrap:wrap; gap:8px; margin-top:2px;
}
.radio-opt {
  display:flex; align-items:center; gap:6px;
  background:var(--panel); border:1px solid var(--border);
  border-radius:7px; padding:7px 14px; cursor:pointer;
  font-size:.85rem; color:var(--textdim); transition:all .15s;
  user-select:none;
}
.radio-opt input { display:none; }
.radio-opt:has(input:checked) {
  border-color:var(--accent); color:var(--accent);
  background:var(--accent-bg); font-weight:700;
}
.radio-opt:hover { border-color:var(--border2); color:var(--text); }

/* ── Conditional reveal ─────────────────────────────────── */
.conditional { display:none; margin-top:10px; }
.conditional.show { display:flex; flex-direction:column; gap:10px; }

/* ── Buttons ─────────────────────────────────────────────── */
.btn-row {
  display:flex; gap:12px; justify-content:flex-end; flex-wrap:wrap;
  margin-top:24px;
}
.btn {
  padding:10px 22px; border-radius:8px; border:none; cursor:pointer;
  font-family:var(--sans); font-size:.88rem; font-weight:700;
  letter-spacing:.3px; transition:all .15s;
}
.btn-primary {
  background:var(--accent); color:#fff;
}
.btn-primary:hover { opacity:.88; transform:translateY(-1px); }
.btn-secondary {
  background:var(--panel); border:1px solid var(--border2); color:var(--textdim);
}
.btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
.btn-dass {
  background:var(--accent4); color:#fff;
}
.btn-dass:hover { opacity:.88; transform:translateY(-1px); }

/* ── Toast ───────────────────────────────────────────────── */
.toast {
  position:fixed; bottom:28px; right:24px;
  background:var(--surface); border:1px solid var(--accent);
  color:var(--accent); padding:10px 18px; border-radius:8px;
  font-size:.85rem; font-weight:600; opacity:0; pointer-events:none;
  transform:translateY(8px); transition:all .25s;
}
.toast.show { opacity:1; pointer-events:auto; transform:translateY(0); }
</style>
</head>
<body>

<header class="form-header">
  <div>
    <h1>T-MIRIM</h1>
    <div class="subtitle">Anamnese & Histórico Sonoro-Musical</div>
  </div>
  <button class="theme-btn" id="btn-theme">☀ Claro</button>
</header>
<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

<div class="form-body">
  <form id="main-form" novalidate>

    <!-- 1. Dados Pessoais -->
    <div class="section open" data-section="1">
      <div class="section-header" onclick="toggleSection(this)">
        <span class="section-icon">👤</span>
        <span class="section-title">1 — Dados Pessoais</span>
        <span class="section-chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="row-2">
          <div class="field">
            <label for="nome">Nome completo *</label>
            <input type="text" id="nome" name="nome" required placeholder="Nome do participante">
          </div>
          <div class="field">
            <label for="data_nasc">Data de nascimento *</label>
            <input type="date" id="data_nasc" name="data_nasc" value="1996-01-01" required>
          </div>
        </div>
        <div class="field">
          <label>Gênero *</label>
          <div class="radio-group" id="grupo-genero">
            <label class="radio-opt"><input type="radio" name="genero" value="Masculino"> Masculino</label>
            <label class="radio-opt"><input type="radio" name="genero" value="Feminino"> Feminino</label>
            <label class="radio-opt"><input type="radio" name="genero" value="Não-binário"> Não-binário</label>
            <label class="radio-opt"><input type="radio" name="genero" value="Outro" id="genero-outro-radio"> Outro</label>
          </div>
          <div class="conditional" id="cond-genero">
            <div class="field">
              <label for="genero_outro">Especifique</label>
              <input type="text" id="genero_outro" name="genero_outro" placeholder="Escreva aqui">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 2. Saúde e Condições -->
    <div class="section" data-section="2">
      <div class="section-header" onclick="toggleSection(this)">
        <span class="section-icon">🏥</span>
        <span class="section-title">2 — Saúde e Condições</span>
        <span class="section-chevron">▼</span>
      </div>
      <div class="section-body">

        <div class="field">
          <label>Apresenta algum problema de audição?</label>
          <div class="radio-group">
            <label class="radio-opt"><input type="radio" name="audicao" value="Sim" data-cond="cond-audicao"> Sim</label>
            <label class="radio-opt"><input type="radio" name="audicao" value="Não"> Não</label>
          </div>
          <div class="conditional" id="cond-audicao">
            <div class="field">
              <label for="audicao_det">Descreva o problema</label>
              <input type="text" id="audicao_det" name="audicao_det" placeholder="Tipo, grau, uso de aparelho...">
            </div>
          </div>
        </div>

        <div class="field">
          <label>Está em acompanhamento médico?</label>
          <div class="radio-group">
            <label class="radio-opt"><input type="radio" name="medico" value="Sim" data-cond="cond-medico"> Sim</label>
            <label class="radio-opt"><input type="radio" name="medico" value="Não"> Não</label>
          </div>
          <div class="conditional" id="cond-medico">
            <div class="field">
              <label for="medico_det">Descreva o acompanhamento</label>
              <input type="text" id="medico_det" name="medico_det" placeholder="Especialidade, motivo...">
            </div>
          </div>
        </div>

        <div class="field">
          <label>Faz uso de medicação?</label>
          <div class="radio-group">
            <label class="radio-opt"><input type="radio" name="medicacao" value="Sim" data-cond="cond-medicacao"> Sim</label>
            <label class="radio-opt"><input type="radio" name="medicacao" value="Não"> Não</label>
          </div>
          <div class="conditional" id="cond-medicacao">
            <div class="row-2">
              <div class="field">
                <label>Qual medicação?</label>
                <input type="text" name="medicacao_nome" placeholder="Nome do medicamento">
              </div>
              <div class="field">
                <label>Desde quando?</label>
                <input type="date" name="medicacao_data">
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- 3. Histórico Sonoro-Musical -->
    <div class="section" data-section="3">
      <div class="section-header" onclick="toggleSection(this)">
        <span class="section-icon">🎵</span>
        <span class="section-title">3 — Histórico Sonoro-Musical</span>
        <span class="section-chevron">▼</span>
      </div>
      <div class="section-body">

        <div class="row-2">
          <div class="field">
            <label>Preferências musicais</label>
            <input type="text" name="preferencias" placeholder="Estilos, gêneros, artistas...">
          </div>
          <div class="field">
            <label>Sons / músicas que gosta</label>
            <input type="text" name="sons_gosta" placeholder="Timbres, ambientes, instrumentos...">
          </div>
        </div>
        <div class="field">
          <label>Sons / músicas que não gosta ou causam desconforto</label>
          <input type="text" name="sons_nao_gosta" placeholder="Sons que incomodam, gatilhos...">
        </div>

        <div class="field">
          <label>Participa de atividades musicais?</label>
          <div class="radio-group">
            <label class="radio-opt"><input type="radio" name="atividades_musicais" value="Sim" data-cond="cond-atividades"> Sim</label>
            <label class="radio-opt"><input type="radio" name="atividades_musicais" value="Não"> Não</label>
          </div>
          <div class="conditional" id="cond-atividades">
            <div class="field">
              <label>Descreva as atividades</label>
              <input type="text" name="atividades_det" placeholder="Coral, grupo de percussão, aulas...">
            </div>
          </div>
        </div>

        <div class="field">
          <label>Possui conhecimento musical formal?</label>
          <div class="radio-group">
            <label class="radio-opt"><input type="radio" name="conhecimento" value="Sim" data-cond="cond-conhecimento"> Sim</label>
            <label class="radio-opt"><input type="radio" name="conhecimento" value="Não"> Não</label>
          </div>
          <div class="conditional" id="cond-conhecimento">
            <div class="row-2">
              <div class="field">
                <label>Escola / instituição</label>
                <input type="text" name="conhecimento_escola" placeholder="Nome da escola ou curso">
              </div>
              <div class="field">
                <label>Por quanto tempo?</label>
                <input type="text" name="conhecimento_tempo" placeholder="ex: 3 anos">
              </div>
            </div>
          </div>
        </div>

        <div class="field">
          <label>Já teve iniciação musical?</label>
          <div class="radio-group">
            <label class="radio-opt"><input type="radio" name="iniciacao" value="Sim" data-cond="cond-iniciacao"> Sim</label>
            <label class="radio-opt"><input type="radio" name="iniciacao" value="Não"> Não</label>
          </div>
          <div class="conditional" id="cond-iniciacao">
            <div class="row-2">
              <div class="field">
                <label>Onde?</label>
                <input type="text" name="iniciacao_local" placeholder="Escola, conservatório, particular...">
              </div>
              <div class="field">
                <label>Por quanto tempo?</label>
                <input type="text" name="iniciacao_tempo" placeholder="ex: 2 anos">
              </div>
            </div>
          </div>
        </div>

        <div class="field">
          <label>Toca algum instrumento?</label>
          <div class="radio-group">
            <label class="radio-opt"><input type="radio" name="instrumento" value="Sim" data-cond="cond-instrumento"> Sim</label>
            <label class="radio-opt"><input type="radio" name="instrumento" value="Não"> Não</label>
          </div>
          <div class="conditional" id="cond-instrumento">
            <div class="row-2">
              <div class="field">
                <label>Qual instrumento?</label>
                <input type="text" name="instrumento_nome" placeholder="Piano, violão, bateria...">
              </div>
              <div class="field">
                <label>Por quanto tempo?</label>
                <input type="text" name="instrumento_tempo" placeholder="ex: 5 anos">
              </div>
            </div>
          </div>
        </div>

        <div class="field">
          <label>Canta?</label>
          <div class="radio-group">
            <label class="radio-opt"><input type="radio" name="canta" value="Sim" data-cond="cond-canta"> Sim</label>
            <label class="radio-opt"><input type="radio" name="canta" value="Não"> Não</label>
          </div>
          <div class="conditional" id="cond-canta">
            <div class="field">
              <label>Por quanto tempo / contexto?</label>
              <input type="text" name="canta_tempo" placeholder="ex: coral há 3 anos, sozinho desde criança...">
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- 4. Ambiente Sonoro Familiar -->
    <div class="section" data-section="4">
      <div class="section-header" onclick="toggleSection(this)">
        <span class="section-icon">🏠</span>
        <span class="section-title">4 — Ambiente Sonoro Familiar</span>
        <span class="section-chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="field">
          <label>Como é o ambiente sonoro-musical em casa?</label>
          <textarea name="ambiente" placeholder="Música ao vivo, rádio, silêncio, TV ligada, instrumentos em casa..."></textarea>
        </div>
        <div class="field">
          <label>Outros sons ou músicas presentes no convívio familiar</label>
          <input type="text" name="outros_sons" placeholder="Cantos religiosos, música popular, baile, festas...">
        </div>
        <div class="field">
          <label>Observações adicionais</label>
          <textarea name="observacoes" placeholder="Qualquer informação relevante sobre o histórico sonoro ou musical..."></textarea>
        </div>
      </div>
    </div>

    <!-- Ações -->
    <div class="btn-row">
      <button type="button" class="btn btn-secondary" onclick="limparForm()">Limpar</button>
      <button type="button" class="btn btn-dass" onclick="irParaDASS()">📋 Ir para DASS-21</button>
      <button type="submit" class="btn btn-primary">💾 Salvar CSV</button>
    </div>

  </form>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Theme ─────────────────────────────────────────────────
const html = document.documentElement;
const themeBtn = document.getElementById('btn-theme');
const saved = localStorage.getItem('tmirim-theme');
if (saved === 'dark') { html.classList.remove('light'); themeBtn.textContent = '🌙 Escuro'; }
themeBtn.onclick = () => {
  const light = html.classList.toggle('light');
  themeBtn.textContent = light ? '☀ Claro' : '🌙 Escuro';
  localStorage.setItem('tmirim-theme', light ? 'light' : 'dark');
};

// ── Pre-fill from localStorage (passed from dashboard) ───
window.addEventListener('DOMContentLoaded', () => {
  const n = localStorage.getItem('participantName');
  if (n) document.getElementById('nome').value = n;
  const params = new URLSearchParams(window.location.search);
  const nomeQ = params.get('nome');
  if (nomeQ) document.getElementById('nome').value = nomeQ;
  updateProgress();
});

// ── Section toggle ────────────────────────────────────────
function toggleSection(header) {
  const section = header.closest('.section');
  section.classList.toggle('open');
  updateProgress();
}

// ── Conditional fields ────────────────────────────────────
document.querySelectorAll('.radio-group input[type=radio]').forEach(radio => {
  radio.addEventListener('change', () => {
    // Generic data-cond
    const condId = radio.dataset.cond;
    if (condId) {
      const cond = document.getElementById(condId);
      if (cond) cond.classList.toggle('show', radio.value === 'Sim');
    }
    // Gênero "Outro"
    if (radio.name === 'genero') {
      document.getElementById('cond-genero').classList.toggle('show', radio.value === 'Outro');
    }
    updateProgress();
  });
});

// Listen all inputs for progress
document.getElementById('main-form').addEventListener('change', updateProgress);
document.getElementById('main-form').addEventListener('input', updateProgress);

// ── Progress ──────────────────────────────────────────────
function updateProgress() {
  const required = ['nome','data_nasc'];
  let filled = 0;
  required.forEach(id => { if (document.getElementById(id)?.value) filled++; });
  const genero = document.querySelector('input[name=genero]:checked');
  if (genero) filled++;
  const pct = Math.min(100, Math.round((filled / (required.length + 1)) * 100));
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ── Toast ─────────────────────────────────────────────────
function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color || 'var(--accent)';
  t.style.color = color || 'var(--accent)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Calc age ──────────────────────────────────────────────
function calcAge(dataNasc) {
  if (!dataNasc) return 'NaN';
  const today = new Date(), birth = new Date(dataNasc);
  let age = today.getFullYear() - birth.getFullYear();
  const m = today.getMonth() - birth.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
  return age;
}

// ── Get genero ────────────────────────────────────────────
function getGenero() {
  const sel = document.querySelector('input[name="genero"]:checked');
  if (!sel) return 'NaN';
  if (sel.value === 'Outro') return document.getElementById('genero_outro').value.trim() || 'Outro';
  return sel.value;
}

// ── Collect all form data ─────────────────────────────────
function collectData() {
  const form = document.getElementById('main-form');
  const data = {};
  form.querySelectorAll('input,textarea,select').forEach(el => {
    if (!el.name) return;
    if (el.type === 'radio') {
      if (el.checked) data[el.name] = el.value;
      else if (!(el.name in data)) data[el.name] = 'NaN';
    } else {
      data[el.name] = el.value.trim() || 'NaN';
    }
  });
  data['genero'] = getGenero();
  data['idade'] = calcAge(data['data_nasc']);
  const today = new Date();
  data['data_teste'] = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  return data;
}

// ── Save to localStorage ──────────────────────────────────
function saveToStorage(data) {
  localStorage.setItem('participantName',   data['nome'] || '');
  localStorage.setItem('participantAge',    data['idade'] || '');
  localStorage.setItem('participantGender', data['genero'] || '');
  localStorage.setItem('testDate',          data['data_teste'] || '');
  localStorage.setItem('anamneseData',      JSON.stringify(data));
}

// ── Export CSV ────────────────────────────────────────────
function exportCSV(data) {
  const keys = Object.keys(data);
  const vals = keys.map(k => `"${String(data[k]).replace(/"/g,'""')}"`);
  const csv = keys.join(',') + '\n' + vals.join(',');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${data['nome'] || 'participante'}_anamnese.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Submit ────────────────────────────────────────────────
document.getElementById('main-form').addEventListener('submit', e => {
  e.preventDefault();
  if (!document.getElementById('nome').value.trim()) {
    showToast('⚠ Informe o nome do participante', 'var(--accent2)');
    return;
  }
  const data = collectData();
  saveToStorage(data);
  exportCSV(data);
  showToast('✓ CSV exportado com sucesso!');
});

// ── DASS redirect ─────────────────────────────────────────
function irParaDASS() {
  const nome = document.getElementById('nome').value.trim();
  if (!nome) { showToast('⚠ Informe o nome antes de continuar', 'var(--accent2)'); return; }
  const data = collectData();
  saveToStorage(data);
  window.location.href = `dass21.html?nome=${encodeURIComponent(nome)}`;
}

// ── Clear ─────────────────────────────────────────────────
function limparForm() {
  if (!confirm('Limpar todos os campos?')) return;
  document.getElementById('main-form').reset();
  document.querySelectorAll('.conditional').forEach(c => c.classList.remove('show'));
  updateProgress();
}
</script>
